name: 规划师日报 - 每日自动生成

on:
  schedule:
    # 每天北京时间 10:30 (UTC 02:30) 运行，分析昨日数据
    - cron: '30 2 * * *'
  workflow_dispatch:
    # 支持手动触发（方便测试）

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic pycryptodome

      - name: Download WeWork Finance SDK
        run: |
          mkdir -p sdk
          # 从企业微信官方下载 Linux x86_64 版 SDK
          # 下载地址需根据企业微信开发者中心最新版本更新
          # https://developer.work.weixin.qq.com/document/path/91774
          if [ ! -f sdk/libWeWorkFinanceSdk_C.so ]; then
            echo "WARNING: SDK .so file not found in sdk/ directory."
            echo "Please download from WeWork developer center and add to repo."
            echo "See: https://developer.work.weixin.qq.com/document/path/91774"
            exit 1
          fi

      - name: Generate daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEWORK_CORP_ID: ${{ secrets.WEWORK_CORP_ID }}
          WEWORK_CHAT_SECRET: ${{ secrets.WEWORK_CHAT_SECRET }}
          WEWORK_PRIVATE_KEY: ${{ secrets.WEWORK_PRIVATE_KEY }}
          WEWORK_PLANNER_MAP: ${{ secrets.WEWORK_PLANNER_MAP }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk
        run: python scripts/generate-planner-daily.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          DATE=$(TZ='Asia/Shanghai' date -d 'yesterday' +%Y-%m-%d)
          git diff --staged --quiet || git commit -m "auto: 规划师日报 ${DATE}"
          git push
