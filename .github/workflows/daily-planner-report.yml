name: 规划师日报 - 每日自动生成

on:
  schedule:
    # 每天北京时间 10:30 (UTC 02:30) 运行，分析昨日数据
    - cron: '30 2 * * *'
  workflow_dispatch:
    # 支持手动触发（方便测试）

permissions:
  contents: write

jobs:
  generate:
    # 使用自托管 Runner（运行在 IP 已加入企业微信白名单的服务器上）
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install anthropic pycryptodome

      - name: Generate daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEWORK_CORP_ID: ${{ secrets.WEWORK_CORP_ID }}
          WEWORK_CHAT_SECRET: ${{ secrets.WEWORK_CHAT_SECRET }}
          WEWORK_PRIVATE_KEY: ${{ secrets.WEWORK_PRIVATE_KEY }}
          WEWORK_PLANNER_MAP: ${{ secrets.WEWORK_PLANNER_MAP }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk
        run: python3 scripts/generate-planner-daily.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          DATE=$(TZ='Asia/Shanghai' date -d 'yesterday' +%Y-%m-%d)
          git diff --staged --quiet || git commit -m "auto: 规划师日报 ${DATE}"
          git push
