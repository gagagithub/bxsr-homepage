name: 产品朋友圈素材 - 每周生成 + 推生产

on:
  schedule:
    # 每周一北京时间 03:00 (UTC 周日 19:00) —— 周一早上规划师上班前就绪
    - cron: '0 19 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/morning-report/requirements.txt

      - name: Generate product moments (对标角度 + 利率 + DeepSeek)
        working-directory: scripts/wealth-weekly
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TOPICPOOL_URL: https://214club.com.cn/creation/topicPool
        run: python -u gen_product_moments.py

      - name: Push to production
        env:
          MORNING_REPORT_TOKEN: ${{ secrets.MORNING_REPORT_TOKEN }}
        run: |
          if [ -z "${MORNING_REPORT_TOKEN}" ]; then
            echo "::error::缺少 secret MORNING_REPORT_TOKEN"; exit 1
          fi
          cd "$GITHUB_WORKSPACE/scripts/wealth-weekly"
          RESP=$(curl -sS --max-time 120 \
            -F "token=${MORNING_REPORT_TOKEN}" \
            -F "json=@product_moments.json;type=application/json" \
            https://214club.com.cn/creation/productMomentUpload)
          echo "server response: ${RESP}"
          echo "${RESP}" | grep -q '"code":0' || { echo "::error::上传失败"; exit 1; }
          echo "✓ 本周产品朋友圈素材已推送到生产"
