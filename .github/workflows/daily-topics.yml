name: 每日热门话题 - TikHub 采集 + DeepSeek 选题分析

on:
  schedule:
    # 每天北京时间 06:30 (UTC 22:30 前一日) 运行。
    # 提前到 6:30 是为了确保「生成 + 提交 + 后台代理 30min 缓存刷新」整条链路
    # 在北京时间 9:00 前全部完成。原 08:00 用的是 '0 0 * * *'(UTC 整点),
    # 是 GitHub Actions 最拥挤的 cron 时刻、排队常延迟 15~60min+,导致页面 ~10 点才更新。
    # 改用非整点分钟(:30)排队更少,且留足 2.5h 缓冲。
    - cron: '30 22 * * *'
  workflow_dispatch:
    # 支持手动触发（方便测试）

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate daily topics report
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate-daily-topics.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          git diff --staged --quiet || git commit -m "auto: 每日热门话题 ${DATE}"
          git push

      - name: Push HTML to production (HTTPS POST, token-auth)
        env:
          TOPIC_POOL_UPLOAD_TOKEN: ${{ secrets.TOPIC_POOL_UPLOAD_TOKEN }}
        run: |
          if [ -z "${TOPIC_POOL_UPLOAD_TOKEN}" ]; then
            echo "::error::缺少 secret TOPIC_POOL_UPLOAD_TOKEN —— 在 GitHub 仓库 Settings → Secrets 添加后重试"
            exit 1
          fi
          # 内地服务器直连 raw.githubusercontent.com 常超时(拉模式会卡在旧缓存不更新),
          # 故由 Action 反向推送: GitHub→内地服务器入站方向可靠。走 HTTPS(214club.com.cn 证书有效),
          # 令牌仅授权覆盖选题池 HTML, 服务端 .token 校验, 落本地副本并即时刷新内存缓存。
          RESP=$(curl -sS --max-time 60 \
            -F "token=${TOPIC_POOL_UPLOAD_TOKEN}" \
            -F "file=@${GITHUB_WORKSPACE}/daily-topics.html" \
            https://214club.com.cn/creation/topicPoolUpload)
          echo "server response: ${RESP}"
          echo "${RESP}" | grep -q '"code":0' || { echo "::error::上传失败(令牌或服务端异常)"; exit 1; }
          echo "✓ 已推送今日选题池 HTML 到生产"
