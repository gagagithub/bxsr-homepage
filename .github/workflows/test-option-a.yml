name: 选项A试跑

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests json-repair
      - name: Run test
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python scripts/test-option-a.py
