<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保心上人 · 团队周报合集 · 第 16 周</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      background: #060c18;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0F2545;
      border-bottom: 3px solid #00D4FF;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,212,255,.1);
      border: 1px solid rgba(0,212,255,.3);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 13px;
      color: #00D4FF;
      text-decoration: none;
      white-space: nowrap;
    }
    .back-btn:hover { background: rgba(0,212,255,.2); }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: #8BA0B5;
      letter-spacing: 2px;
    }
    .header-title span {
      color: #00D4FF;
      margin-left: 10px;
    }

    .week-badge {
      font-size: 12px;
      padding: 3px 12px;
      border: 1px solid #00D4FF;
      color: #00D4FF;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    nav {
      background: #080F1E;
      border-bottom: 1px solid #1a2a3a;
      padding: 0 24px;
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .tab {
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 700;
      color: #8BA0B5;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .15s;
      letter-spacing: 1px;
    }
    .tab:hover { color: #fff; }
    .tab.active {
      color: #00D4FF;
      border-bottom-color: #00D4FF;
    }
    .tab.editor.active {
      color: #00C96E;
      border-bottom-color: #00C96E;
    }

    .frame-wrap {
      flex: 1;
      position: relative;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
    iframe.active { display: block; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="back-btn" href="weekly-reports.html">← 返回列表</a>
    <div class="header-title">
      保心上人 · 团队周报合集
      <span>2026年4月13日 — 4月17日</span>
    </div>
  </div>
  <div class="week-badge">WEEK 16</div>
</header>

<nav>
  <div class="tab active" onclick="switchTab('planner', this)">📊 规划师团队</div>
  <div class="tab editor" onclick="switchTab('editor', this)">✍️ 内容团队</div>
</nav>

<div class="frame-wrap">
  <iframe id="frame-planner" class="active" src="weekly-report-planner-0413-0417.html"></iframe>
  <iframe id="frame-editor" src="weekly-report-editor-0413-0417.html"></iframe>
</div>

<script>
  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('frame-' + name).classList.add('active');
  }
</script>

</body>
</html>
