<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日热门话题 · 2026-05-31</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      background: #f0f2f8;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #1E2761 0%, #162050 60%, #028090 100%);
      color: #fff;
      padding: 28px 24px 24px;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 13px;
      color: rgba(255,255,255,.8);
      text-decoration: none;
      margin-bottom: 14px;
    }
    .back-btn:hover { background: rgba(255,255,255,.2); }
    header h1 { font-size: clamp(18px,3vw,26px); font-weight: 700; margin-bottom: 4px; }
    .header-sub { font-size: 13px; opacity: .6; }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .topic-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: start;
    }

    .topic-card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .topic-header {
      padding: 14px 20px;
      font-size: 1.05em;
      font-weight: 700;
      letter-spacing: 1px;
      color: white;
    }

    .platform-section {
      padding: 14px 18px;
      border-bottom: 1px solid #f0f0f0;
    }
    .platform-section:last-child { border-bottom: none; }

    .platform-name {
      font-size: 0.78em;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    .plat-count { color:#bbb; font-weight: 500; }

    .item-list { display: flex; flex-direction: column; gap: 10px; }

    .item-card {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      background: #fafbfd;
      border-radius: 10px;
      border-left: 3px solid transparent;
      transition: background .15s;
    }
    .item-card:hover { background: #f3f5f9; }
    .item-card.muted { opacity: 0.55; background: #f5f5f5; border-left-color:#ddd; }
    .item-card.muted .tl { color: #888; }

    .rank-col {
      width: 22px;
      color: #ccc;
      font-weight: 700;
      font-size: 0.9em;
      flex-shrink: 0;
    }
    .content-col { flex: 1; min-width: 0; }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .tl {
      color: #1E2761;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95em;
      line-height: 1.35;
    }
    .tl:hover { color: #028090; text-decoration: underline; }

    .biz-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 0.7em;
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .summary {
      color: #555;
      font-size: 0.85em;
      line-height: 1.5;
      margin: 4px 0;
    }

    .hl-row { margin: 4px 0; display: flex; flex-wrap: wrap; gap: 4px; }
    .hl-chip {
      display: inline-block;
      padding: 1px 7px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      font-size: 0.72em;
      color: #6366F1;
      font-weight: 500;
    }

    .angle {
      margin: 6px 0 4px;
      padding: 5px 10px;
      background: #fff8e1;
      border-radius: 6px;
      font-size: 0.82em;
      color: #92590a;
      line-height: 1.45;
    }
    .item-card.muted .angle { display: none; }

    .biz-reason {
      margin: 4px 0;
      font-size: 0.78em;
      color: #9CA3AF;
      font-style: italic;
    }

    .meta-row {
      margin-top: 5px;
      color: #aaa;
      font-size: 0.78em;
    }
    .hot-score {
      color: #F59E0B;
      font-weight: 600;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: #ccc;
      font-size: 0.9em;
    }

    footer {
      text-align: center;
      color: #aaa;
      font-size: 0.8em;
      padding: 20px;
    }

    .legend {
      max-width: 1100px;
      margin: 16px auto 0;
      padding: 12px 16px;
      background: white;
      border-radius: 10px;
      font-size: 0.8em;
      color: #666;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      align-items: center;
    }
    .legend b { color:#333; }

    @media (min-width: 900px) {
      .topic-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="back-btn" href="index.html">&larr; 返回首页</a>
    <h1>🔥 每日热门话题</h1>
    <div class="header-sub">2026年5月31日 · B站 / 小红书 / 抖音 / 西瓜视频</div>

  <span><span class="biz-badge" style="background:#E5E7EB;color:#6B7280;">不建议</span> 不要做</span>
  <span style="margin-left:auto;color:#aaa;">🔥 = 同平台百分位热度分(0-100) · 💡 = AI 再创作角度建议</span>
</div>

<main>
  <div class="topic-grid">
    
    <div class="topic-card">

      </div>
      <div class="empty">暂无数据</div>
    </div>
    <div class="topic-card">

        🏛️ 内地保险/年金/增额寿
      </div>
      <div class="empty">暂无数据</div>
    </div>
    <div class="topic-card">
      <div class="topic-header" style="background:#F59E0B;">
        💰 存钱
      </div>
      <div class="empty">暂无数据</div>
    </div>
    <div class="topic-card">
      <div class="topic-header" style="background:#6366F1;">
        🏦 存款/定存/国债
      </div>

    <div class="topic-card">

</main>

<footer>🔄 每日自动更新 · TikHub 搜索 + DeepSeek 选题分析</footer>

</html>
