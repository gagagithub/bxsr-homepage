<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保心上人 · 内部工作台</title>
  <style>
    :root {
      --cream:   #FAF7F2;
      --warm:    #F2EBE0;
      --paper:   #FFFDF9;
      --brown:   #3D2B1F;
      --mid:     #7A5C48;
      --light:   #B09880;
      --accent:  #8B5E3C;
      --accent2: #C4884A;
      --border:  #E5D9CC;
      --shadow:  rgba(61,43,31,.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--cream);
      color: var(--brown);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 52px 40px 44px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* 背景纹理：细竖线 */
    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 39px,
        rgba(139,94,60,.04) 39px,
        rgba(139,94,60,.04) 40px
      );
      pointer-events: none;
    }

    .header-inner { position: relative; z-index: 1; }

    .brand-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--warm);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 16px;
      font-size: 12px;
      color: var(--mid);
      letter-spacing: 2px;
      margin-bottom: 22px;
    }

    header h1 {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--brown);
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 18px auto 0;
      max-width: 240px;
    }
    .header-divider::before,
    .header-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .header-sub {
      font-size: 12px;
      color: var(--light);
      letter-spacing: 3px;
      white-space: nowrap;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 52px 24px 80px;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--light);
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── ENTRY CARDS ── */
    .entry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .entry-card {
      display: flex;
      flex-direction: column;
      background: var(--paper);
      border-radius: 8px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .entry-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px var(--shadow);
      border-color: var(--accent2);
    }

    .entry-card-top {
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      position: relative;
      overflow: hidden;
      background: var(--warm);
      border-bottom: 1px solid var(--border);
    }

    /* 每张卡片的颜色条 — 只用左边的细色带来区分，不用大色块 */
    .entry-card::before {
      content: "";
      display: block;
      height: 3px;
      background: var(--accent);
    }
    .entry-card.weekly::before    { background: linear-gradient(90deg, #8B5E3C, #C4884A); }
    .entry-card.daily::before     { background: linear-gradient(90deg, #5C7A3E, #8AAF5A); }
    .entry-card.hk-daily::before  { background: linear-gradient(90deg, #7B4A8B, #B07AC0); }
    .entry-card.planner::before   { background: linear-gradient(90deg, #3A6E8A, #5AA0C4); }

    .entry-card-body {
      padding: 22px 24px 26px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .entry-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--brown);
      letter-spacing: 0.5px;
    }

    .entry-desc {
      font-size: 13px;
      color: var(--mid);
      line-height: 1.75;
      flex: 1;
    }

    .entry-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .entry-cta .arrow {
      transition: transform .15s;
      font-style: normal;
    }
    .entry-card:hover .entry-cta .arrow { transform: translateX(4px); }

    /* ── FOOTER ── */
    footer {
      background: var(--warm);
      border-top: 1px solid var(--border);
      color: var(--light);
      text-align: center;
      padding: 24px;
      font-size: 11px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand-tag">🏡 保心上人 · 让天下人老有所养</div>
    <h1>内部工作台</h1>
    <div class="header-divider">
      <span class="header-sub">团队数据 · 内容分析 · 仅限内部</span>
    </div>
  </div>
</header>

<main>
  <div class="section-label">选择模块</div>

  <div class="entry-grid">

    <a class="entry-card weekly" href="weekly-reports.html">

      <div class="entry-card-body">

        <div class="entry-cta">查看报告列表 <i class="arrow">›</i></div>
      </div>

    <a class="entry-card daily" href="daily-topics-reports.html">
      <div class="entry-card-top">🔥</div>
      <div class="entry-card-body">
        <div class="entry-title">每日热门话题</div>
        <div class="entry-desc">每日精选高互动选题参考，帮助内容团队快速发现趋势话题，提升视频选题的爆款率。</div>
        <div class="entry-cta">查看今日热点 <i class="arrow">›</i></div>
      </div>
    </a>

      <div class="entry-card-top">📰</div>

        <div class="entry-title">香港保险日报</div>
        <div class="entry-desc">每日自动搜集全网关于「香港保险」的热门话题，覆盖小红书、抖音、今日头条、B站、视频号五大平台。</div>
        <div class="entry-cta">查看日报列表 <i class="arrow">›</i></div>
      </div>
    </a>
    -->

    <!-- 规划师日报（暂时隐藏）
    <a class="entry-card planner" href="planner-daily-reports.html">
      <div class="entry-card-top">💬</div>
      <div class="entry-card-body">
        <div class="entry-title">规划师日报</div>

        <div class="entry-cta">查看日报列表 <i class="arrow">›</i></div>
      </div>
    </a>
    -->

  </div>
</main>

<footer>
  保心上人 · CONFIDENTIAL · INTERNAL USE ONLY
</footer>

</body>
</html>
