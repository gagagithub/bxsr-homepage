<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保心上人 · 内部工作台</title>
  <style>
    :root {
      --navy:  #1E2761;
      --teal:  #028090;
      --mint:  #02C39A;
      --off:   #F4F6FB;
      --gray:  #8892A4;
      --dark:  #111827;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--off);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--navy) 0%, #162050 60%, var(--teal) 100%);
      color: var(--white);
      padding: 56px 40px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .header-inner { position: relative; z-index: 1; }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 100px;
      padding: 6px 20px;
      font-size: 14px;
      margin-bottom: 20px;
    }
    header h1 { font-size: clamp(22px, 4vw, 36px); font-weight: 700; letter-spacing: -0.5px; }
    header p  { font-size: 14px; opacity: .6; margin-top: 8px; }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--gray);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── ENTRY CARDS ── */
    .entry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .entry-card {
      display: flex;
      flex-direction: column;
      background: var(--white);
      border-radius: 20px;
      border: 1.5px solid #E8EDF8;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform .18s, box-shadow .18s, border-color .18s;
    }
    .entry-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(30,39,97,.12);
      border-color: var(--teal);
    }

    .entry-card-top {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      position: relative;
      overflow: hidden;
    }
    .entry-card-top.weekly {
      background: linear-gradient(135deg, var(--navy), var(--teal));
    }
    .entry-card-top.daily {
      background: linear-gradient(135deg, #2C5F2D, #028090);
    }
    .entry-card-top.planner {
      background: linear-gradient(135deg, #7B2D8B, #C0507A);
    }
    .entry-card-top.editor {
      background: linear-gradient(135deg, #B8860B, #DAA520);
    }
    .entry-card-top.service {
      background: linear-gradient(135deg, #1A5276, #2E86C1);
    }
    .entry-card-top.hk-daily {
      background: linear-gradient(135deg, #7B2D8B, #C0507A);
    }
    .entry-card-top::after {
      content: "";
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='20' cy='20' r='8'/%3E%3C/g%3E%3C/svg%3E");
    }

    .entry-card-body {
      padding: 24px 24px 28px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .entry-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
    }
    .entry-desc {
      font-size: 13px;
      color: var(--gray);
      line-height: 1.6;
      flex: 1;
    }
    .entry-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--teal);
    }
    .entry-card:hover .entry-cta { gap: 10px; }
    .entry-cta span { transition: transform .15s; }
    .entry-card:hover .entry-cta span { transform: translateX(3px); }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,.4);
      text-align: center;
      padding: 28px 24px;
      font-size: 12px;
      letter-spacing: 1px;
    }


  </style>
</head>
<body>


<header>
  <div class="header-inner">
    <div class="brand">🏡 保心上人 · 让天下人老有所养</div>
    <h1>内部工作台</h1>
    <p>团队数据 · 内容分析 · 仅限内部使用</p>
  </div>
</header>

<main>
  <div class="section-label">选择模块</div>

  <div class="entry-grid">

    <a class="entry-card" href="weekly-reports.html">
      <div class="entry-card-top weekly">📋</div>
      <div class="entry-card-body">
        <div class="entry-title">团队周/月/季度/年报</div>
        <div class="entry-desc">规划师、编辑、剪辑三大团队的周度数据汇总，含季度、月度、年度专项报告，覆盖拓客成果、完播率、成交转化等核心指标。</div>
        <div class="entry-cta">查看报告列表 <span>›</span></div>
      </div>
    </a>

    <a class="entry-card" href="https://rainbow-hummingbird-0239e1.netlify.app/daily-report.html">
      <div class="entry-card-top daily">🔥</div>
      <div class="entry-card-body">
        <div class="entry-title">每日热门话题</div>
        <div class="entry-desc">每日精选高互动选题参考，帮助内容团队快速发现趋势话题，提升视频选题的爆款率。</div>
        <div class="entry-cta">查看今日热点 <span>›</span></div>
      </div>
    </a>

    <a class="entry-card" href="hk-insurance-reports.html">
      <div class="entry-card-top hk-daily">📰</div>
      <div class="entry-card-body">
        <div class="entry-title">香港保险日报</div>
        <div class="entry-desc">每日自动搜集全网关于「香港保险」的热门话题，覆盖小红书、抖音、今日头条、B站、视频号五大平台。</div>
        <div class="entry-cta">查看日报列表 <span>›</span></div>
      </div>
    </a>

  </div>

</main>

<footer>
  保心上人 · CONFIDENTIAL · INTERNAL USE ONLY
</footer>

</body>
</html>
